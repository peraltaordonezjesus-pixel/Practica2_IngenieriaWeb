<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario con validación</title>
    <link rel="stylesheet" href="../css/formStyles.css">
</head>
<body>
    <script type="module" src="../js/validateFormB.js"></script>
    <form id="formRecuperacion" novalidate>
        <h2>Formulario de registro</h2>

        <label for="nombre">Nombre:</label>
        <input 
            type="text" 
            id="nombre" 
            name="nombre"
            pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]{3,50}"
            placeholder="Ej. Juan López" 
            required 
            autofocus
        >
        <span class="mensaje" id="error-nombre"></span>
        
        <label for="correo">Correo electrónico:</label>
        <input 
            type="email" 
            id="correo" 
            name="correo"
            placeholder="correo@ejemplo.com" 
            required
        >

        <label for="password">Contraseña:</label>
        <input 
            type="password" 
            id="password" 
            name="password"
            minlength="8"
            placeholder="Mínimo 8 caracteres"
            required
        >
        <span class="mensaje" id="error-password"></span>

        <label>Pregunta de recuperación:</label>
        <select id="preguntaRecuperacion" required>
        <option value="">Seleccione una pregunta</option>
        <option value="mascota">¿Nombre de tu primera mascota?</option>
        <option value="escuela">¿Nombre de tu escuela primaria?</option>
        <option value="comida">¿Comida favorita?</option>
        </select>

        <label>Respuesta:</label>
        <input type="text" id="respuestaRecuperacion" required>        

        <span class="mensaje" id="error-correo"></span>

        <div class="btnContainer">            
            <button class="submit" type="submit">Enviar</button>
            <button class="reset" type="reset">Limpiar</button>
            <button type="button" class="reset" onclick="history.back()"> Regresar</button>
        </div>  
    </form>

    <pre id="resultado"></pre>

    <div id="modal" class="modal">
    <div class="modal-content">
        <span id="cerrarModal">&times;</span>
        <p id="modalMensaje"></p>
    </div>
    </div>    
</body>
</html>
